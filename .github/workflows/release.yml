name: Build and Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows EXE
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build EXE with PyInstaller
        run: |
          pyinstaller `
            --onefile `
            --windowed `
            --icon=logo.ico `
            --name="URL Auditor Pro" `
            --add-data "logo.ico;." `
            url_auditor.py

      - name: Rename artifact
        run: |
          $tag = "${{ github.ref_name }}"
          $src = "dist\URL Auditor Pro.exe"
          $dst = "dist\URL-Auditor-Pro-$tag-windows.exe"
          Rename-Item -Path $src -NewName (Split-Path $dst -Leaf)
          echo "EXE_PATH=$dst" >> $env:GITHUB_ENV

      - name: Create Release and upload EXE
        uses: softprops/action-gh-release@v2
        with:
          name: "URL Auditor Pro ${{ github.ref_name }}"
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: ${{ env.EXE_PATH }}
          body: |
            ## URL Auditor Pro ${{ github.ref_name }}

            ### Download
            Download **`URL-Auditor-Pro-${{ github.ref_name }}-windows.exe`** below.

            > **Note:** Place `chromedriver.exe` (and optionally `geckodriver.exe`) in the same folder as the `.exe` before running.
            > Download ChromeDriver from https://chromedriver.chromium.org/downloads — match your installed Chrome version.

            ### What's included
            - Single-file Windows executable (no Python install needed)
            - All dependencies bundled

            See [README](https://github.com/sudhirjangra/url-auditor-pro#readme) for full usage instructions.
