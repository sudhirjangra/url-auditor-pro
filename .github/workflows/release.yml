name: Build and Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows EXE
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller pillow

      - name: Build EXE with PyInstaller
        run: |
          pyinstaller `
            --onefile `
            --windowed `
            --icon=logo.ico `
            --name="URL Auditor Pro" `
            --add-data "logo.ico;." `
            --collect-all selenium `
            --collect-all urllib3 `
            --hidden-import=selenium.webdriver.chrome.webdriver `
            --hidden-import=selenium.webdriver.firefox.webdriver `
            --hidden-import=selenium.webdriver.chrome.service `
            --hidden-import=selenium.webdriver.firefox.service `
            --hidden-import=selenium.webdriver.common.service `
            --hidden-import=selenium.webdriver.remote.webdriver `
            --hidden-import=webdriver_manager.chrome `
            --hidden-import=webdriver_manager.firefox `
            url_auditor.py

      - name: Get installed Chrome version
        id: chrome_version
        run: |
          $version = (Get-Item "C:\Program Files\Google\Chrome\Application\chrome.exe").VersionInfo.FileVersion
          $major = $version.Split(".")[0]
          echo "CHROME_MAJOR=$major" >> $env:GITHUB_ENV
          echo "Chrome version: $version (major: $major)"

      - name: Download matching ChromeDriver
        run: |
          $major = "${{ env.CHROME_MAJOR }}"
          # Get the matching chromedriver version from Chrome for Testing API
          $apiUrl = "https://googlechromelabs.github.io/chrome-for-testing/known-good-versions-with-downloads.json"
          $data = Invoke-RestMethod -Uri $apiUrl
          # Find latest version matching the major
          $match = $data.versions | Where-Object { $_.version.StartsWith("$major.") } | Select-Object -Last 1
          if (-not $match) {
            Write-Error "No chromedriver found for Chrome major version $major"
            exit 1
          }
          $download = $match.downloads.chromedriver | Where-Object { $_.platform -eq "win64" }
          $url = $download.url
          echo "Downloading chromedriver $($match.version) from $url"
          Invoke-WebRequest -Uri $url -OutFile "chromedriver_win64.zip"
          Expand-Archive -Path "chromedriver_win64.zip" -DestinationPath "chromedriver_extracted" -Force
          $exe = Get-ChildItem -Path "chromedriver_extracted" -Recurse -Filter "chromedriver.exe" | Select-Object -First 1
          Copy-Item $exe.FullName -Destination "dist\chromedriver.exe"
          echo "ChromeDriver $($match.version) ready"

      - name: Download latest GeckoDriver
        run: |
          $release = Invoke-RestMethod -Uri "https://api.github.com/repos/mozilla/geckodriver/releases/latest"
          $asset = $release.assets | Where-Object { $_.name -like "*win64.zip" } | Select-Object -First 1
          if (-not $asset) {
            Write-Warning "GeckoDriver win64 asset not found, skipping"
          } else {
            echo "Downloading geckodriver $($release.tag_name): $($asset.browser_download_url)"
            Invoke-WebRequest -Uri $asset.browser_download_url -OutFile "geckodriver.zip"
            Expand-Archive -Path "geckodriver.zip" -DestinationPath "geckodriver_extracted" -Force
            Copy-Item "geckodriver_extracted\geckodriver.exe" -Destination "dist\geckodriver.exe"
            echo "GeckoDriver $($release.tag_name) ready"
          }

      - name: Package release ZIP
        run: |
          $tag = "${{ github.ref_name }}"
          $zipName = "URL-Auditor-Pro-$tag-windows.zip"
          $staging = "release_staging"
          New-Item -ItemType Directory -Path $staging | Out-Null

          Copy-Item "dist\URL Auditor Pro.exe" "$staging\URL Auditor Pro.exe"
          Copy-Item "dist\chromedriver.exe"    "$staging\chromedriver.exe"
          if (Test-Path "dist\geckodriver.exe") {
            Copy-Item "dist\geckodriver.exe"   "$staging\geckodriver.exe"
          }

          Compress-Archive -Path "$staging\*" -DestinationPath "dist\$zipName" -Force
          echo "ZIP_PATH=dist\$zipName" >> $env:GITHUB_ENV
          echo "ZIP_NAME=$zipName"      >> $env:GITHUB_ENV

      - name: Delete existing release if present
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = "${{ github.ref_name }}"
          gh release view $tag 2>$null
          if ($LASTEXITCODE -eq 0) {
            gh release delete $tag --yes --cleanup-tag
            echo "Deleted existing release for $tag"
          } else {
            echo "No existing release for $tag"
          }
          exit 0

      - name: Create Release and upload ZIP
        uses: softprops/action-gh-release@v2
        with:
          name: "URL Auditor Pro ${{ github.ref_name }}"
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: false
          files: ${{ env.ZIP_PATH }}
          body: |
            ## URL Auditor Pro ${{ github.ref_name }}

            ### Download
            Download **`${{ env.ZIP_NAME }}`** below — extract the folder and run `URL Auditor Pro.exe`.

            ### What's included in the ZIP
            | File | Description |
            |------|-------------|
            | `URL Auditor Pro.exe` | Main application |
            | `chromedriver.exe` | Auto-matched to the Chrome version on the build runner |
            | `geckodriver.exe` | Latest GeckoDriver for Firefox dual-browser verify (optional) |

            ### Changelog ${{ github.ref_name }}
            - **UI:** Added `#` index column, newest result shown at top (descending)
            - **UI:** Removed Notes column from table; all columns are now drag-resizable
            - **Logging:** New timestamped log file per run (`url_auditor_YYYY-MM-DD_HH-MM-SS.log`)
            - **Dual-browser:** Firefox fallback only triggers when Chrome reports Inactive (not on driver errors)
            - **Dual-browser:** Both-browser results now show combined Chrome + Firefox notes

            > **If ChromeDriver version mismatch on your machine:**
            > Download the chromedriver matching **your** Chrome version from
            > https://googlechromelabs.github.io/chrome-for-testing/
            > and replace `chromedriver.exe` in the folder.
            > Check your Chrome version at `chrome://version`

            See [README](https://github.com/sudhirjangra/url-auditor-pro#readme) for full usage instructions.
